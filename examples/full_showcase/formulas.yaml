# Demonstrates cross-file symbol resolution:
# FS_VIN and FS_CURRENT are defined in app.c as C macros.
# CalcDocs resolves these external C symbols when evaluating YAML formulas.
FS_POWER:
  formula: FS_VIN * FS_CURRENT
  unit: W

EFFICIENCY:
  formula: FS_POWER / 72 W
  unit: "%"

NTC_RESISTANCE:
  formula: csv("data/ntc_10k.csv", "25.03", "temperature", "resistance", "linear")
  unit: ohm
